server:
  port: 8082

spring:
  application:
    name: pessoa
  profiles:
    active: local

---

spring:
  config:
    activate:
      on-profile: local
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test
      sqs:
        endpoint: http://localhost:4566
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9997/realms/pessoa-realm
  data:
    redis:
      host: localhost
      port: 6379

app:
  storage:
    s3:
      bucket: pessoa-s3-local
      #endpoint: http://localhost:4566
      endpoint: http://s3.localhost.localstack.cloud:4566
      region: us-east-1
      access-key: test
      secret-key: test
      path-style-access: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui/index.html
    url: /openapi.yaml

---

spring:
  config:
    activate:
      on-profile: aws
  cloud:
    aws:
      region:
        static: us-east-1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9997/realms/pessoa-realm
  data:
    redis:
      host: localhost
      port: 6379

app:
  storage:
    s3:
      bucket: pessoa-s3-aws
      region: us-east-1
      path-style-access: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui/index.html
    url: /openapi.yaml