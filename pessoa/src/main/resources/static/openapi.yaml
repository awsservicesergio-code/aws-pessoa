openapi: 3.0.3

info:
  title: Pessoa API
  description: API para cadastro de pessoas com upload de arquivo.
  version: 1.0.0

servers:
  - url: http://localhost:8082

tags:
  - name: Pessoa
    description: Operações relacionadas a pessoas

paths:
  /api/v1/pessoas:
    post:
      tags:
        - Pessoa
      summary: Cadastrar pessoa com arquivo
      description: |
        Recebe os dados da pessoa juntamente com um arquivo.
        O arquivo será processado e pode ser armazenado no S3.
      operationId: criarPessoa
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - pessoa
                - arquivo
              properties:
                pessoa:
                  type: string
                  description: JSON da pessoa
                  example: |
                    {
                      "nome": "João da Silva",
                      "cpf": "12345678900",
                      "s3Key": "12345678900/teste.pdf"
                    }
                arquivo:
                  type: string
                  format: binary
      responses:
        '201':
          description: Pessoa cadastrada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PessoaDTO'
        '400':
          description: Requisição inválida
        '500':
          description: Erro interno do servidor

components:
  schemas:
    PessoaDTO:
      type: object
      required:
        - nome
        - cpf
      properties:
        id:
          type: string
          readOnly: true
        nome:
          type: string
          example: João da Silva
        cpf:
          type: string
          example: "12345678900"
        s3Key:
          type: string
          "example": "12345678900/teste.pdf"